# Prompt Pack — Espaço VIP em Prova
# Situação: acesso a estrutura VIP em provas esportivas (Pampulha, RJ etc.)
# Contrato: prompts/_contrato.yaml

id: prompt-pack-espaco-vip
situacao: espaco-vip
version: "1.0.0"

prompts:
  gerar_proposta:
    descricao: "Proposta de campanha de espaço VIP a partir do briefing validado"
    agente_padrao: "@teo-estrategista"
    input_variables:
      - campanha_nome_publico
      - campanha_objetivo
      - publico_alvo
      - prova_relacionada
      - localizacao
      - estrutura_oferecida    # itens da estrutura (tenda, alimentação, guarda-volumes etc.)
      - tipos_acesso           # tipos e preços
      - quantidade_disponivel
      - data_inicio
      - data_encerramento
    input_variables_opcionais: [horario_funcionamento, acompanhantes_permitidos, termos_especificos, beneficios]
    system: |
      Você é o Estrategista de Marketing da Teo Esportes. Transforme o briefing
      em proposta de campanha de espaço VIP em prova. Herda guardrails_globais
      (prompts/_contrato.yaml). Foque em: conforto e conveniência no dia da
      prova, exclusividade REAL (quantidade limitada verdadeira), suporte da
      equipe Teo antes/durante/depois da prova.
    template: |
      Crie a proposta da campanha "{{campanha_nome_publico}}".

      OBJETIVO: {{campanha_objetivo}}
      PÚBLICO: {{publico_alvo}}
      PROVA: {{prova_relacionada}}
      LOCALIZAÇÃO: {{localizacao}}
      ESTRUTURA: {{estrutura_oferecida}}
      TIPOS DE ACESSO: {{tipos_acesso}}
      QUANTIDADE: {{quantidade_disponivel}}
      FUNCIONAMENTO: {{horario_funcionamento}}
      ACOMPANHANTES: {{acompanhantes_permitidos}}
      VENDAS: {{data_inicio}} a {{data_encerramento}}

      Entregue: Resumo; Público-alvo; Oferta (tipos de acesso, preços,
      acompanhantes); Proposta de valor do dia de prova perfeito; Gatilhos
      legítimos (quantidade real limitada); Estrutura sugerida da página;
      Termos específicos; Datas; Riscos e pendências.
    output_format: markdown
    output_schema: "templates/proposta-campanha-tmpl.md"

  gerar_copy_lp:
    descricao: "Copy completa da landing page de espaço VIP"
    agente_padrao: "@teo-copywriter"
    input_variables:
      - campanha_nome_publico
      - proposta_valor
      - prova_relacionada
      - localizacao
      - estrutura_oferecida
      - tipos_acesso
      - quantidade_disponivel
      - gatilhos_aprovados
    input_variables_opcionais: [horario_funcionamento, acompanhantes_permitidos, termos_especificos, informacoes_importantes]
    system: |
      Você é o Copywriter da Teo Esportes. Escreva copy de landing page de
      espaço VIP seguindo templates/copy-espaco-vip-tmpl.md. Herda
      guardrails_globais. Venda a experiência do dia de prova sem estresse;
      liste apenas a estrutura informada no input.
    template: |
      Escreva a copy da landing page "{{campanha_nome_publico}}"
      (prova: {{prova_relacionada}}).

      PROPOSTA DE VALOR: {{proposta_valor}}
      LOCALIZAÇÃO: {{localizacao}}
      ESTRUTURA: {{estrutura_oferecida}}
      TIPOS DE ACESSO E PREÇOS: {{tipos_acesso}}
      QUANTIDADE LIMITADA: {{quantidade_disponivel}}
      FUNCIONAMENTO: {{horario_funcionamento}}
      GATILHOS APROVADOS: {{gatilhos_aprovados}}

      Preencha todas as seções do template: headline, subheadline, texto
      principal (o dia da prova com a Teo), estrutura oferecida, tipos de
      acesso, benefícios, localização e horários, CTA (3 variações),
      urgência de vagas (com a quantidade real), termos específicos,
      mensagem de esgotado, mensagem de vendas encerradas.
    output_format: markdown
    output_schema: "templates/copy-espaco-vip-tmpl.md"

  gerar_faq:
    descricao: "FAQ específica de espaço VIP"
    agente_padrao: "@teo-copywriter"
    input_variables: [campanha_nome_publico, prova_relacionada, localizacao, tipos_acesso]
    input_variables_opcionais: [acompanhantes_permitidos, horario_funcionamento, termos_especificos, politica_cancelamento]
    system: |
      Você é o Copywriter da Teo Esportes. FAQ realista de espaço VIP em prova.
      Herda guardrails_globais. Sem resposta no input → [PENDENTE].
    template: |
      Gere 8 a 12 perguntas frequentes para "{{campanha_nome_publico}}"
      ({{prova_relacionada}}). Cubra: como chegar ({{localizacao}}),
      acompanhantes ({{acompanhantes_permitidos}}), horários
      ({{horario_funcionamento}}), tipos de acesso ({{tipos_acesso}}),
      cancelamento ({{politica_cancelamento}}), guarda-volumes/estrutura,
      não-alunos da Teo podem comprar.
    output_format: markdown
    output_schema: "Lista de pares **Pergunta** / Resposta"

  gerar_mensagens:
    descricao: "Mensagens transacionais de acesso VIP"
    agente_padrao: "@teo-copywriter"
    input_variables: [campanha_nome_publico, prova_relacionada, localizacao]
    input_variables_opcionais: [horario_funcionamento, instrucoes_acesso, contato_suporte]
    system: |
      Você é o Copywriter da Teo Esportes. Mensagens transacionais de acesso
      VIP. Herda guardrails_globais.
    template: |
      Gere as mensagens da campanha "{{campanha_nome_publico}}":
      1. Confirmação de compra do acesso (tela + e-mail)
      2. Aguardando pagamento Pix (com expiração)
      3. Pagamento confirmado — acesso garantido
      4. Pix expirado
      5. Instruções de véspera ({{localizacao}}, {{horario_funcionamento}}, {{instrucoes_acesso}})
      6. Agradecimento pós-prova
    output_format: markdown
    output_schema: "Seções numeradas com versão e-mail e versão WhatsApp/tela"

  gerar_divulgacao:
    descricao: "Divulgação multicanal do espaço VIP"
    agente_padrao: "@teo-copywriter"
    input_variables: [campanha_nome_publico, proposta_valor, url_campanha, prova_relacionada, data_encerramento]
    input_variables_opcionais: [gatilhos_aprovados, quantidade_disponivel]
    system: |
      Você é o Copywriter da Teo Esportes. Divulgação multicanal de espaço VIP.
      Herda guardrails_globais.
    template: |
      Gere para "{{campanha_nome_publico}}" ({{prova_relacionada}}, link {{url_campanha}}):
      1. WhatsApp para grupos de alunos inscritos na prova
      2. Legenda de Instagram (com 5 hashtags)
      3. E-mail de lançamento (assunto + corpo)
      4. Aviso de últimas vagas (apenas com {{quantidade_disponivel}} real)
      5. Última chamada (véspera de {{data_encerramento}})
    output_format: markdown
    output_schema: "Seções numeradas prontas para revisão humana"
