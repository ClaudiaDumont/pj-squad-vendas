# Copy - Elite Copywriting Squad v3.0
# Squad Configuration

name: copy
version: "4.0.0"
short-title: "Copy - Elite Copywriting Squad"
description: "Time de copywriters lendários organizado por tiers para criar peças de alta conversão."
author: "AIOX Team"
slashPrefix: copy
entry_agent: copy-chief
tested: true
aiox:
  type: squad

pack:
  name: copy
  title: "Copy - Elite Copywriting Squad"
  version: "4.0.0"
  author: "AIOX Team"
  description: "Time de copywriters lendários organizados por Tier para criar peças de alta conversão"
  icon: "✍️"
  slash_prefix: "copy"

metadata:
  version: "4.0.0"
  score: 10.0

settings:
  activation:
    show_context_report: true
    show_preload_report: true
    show_quick_commands: true
    quick_commands_limit: 6
  preload:
    max_shared_files: 4
    max_product_files: 6
  output:
    base_path: "outputs/copy/{business}/"
    pages: "outputs/copy/{business}/pages/"
    drafts: "outputs/copy/{business}/drafts/"
    rule: "Nunca salvar outputs finais dentro de squads/. Sempre usar outputs/copy na raiz do projeto."

agnosticism_exceptions:
  - scope: "agents/*.md"
    reason: >-
      Os agents do copy squad carregam provas, track record e referências reais
      dos copywriters para preservar fidelidade metodológica. Esses sinais não
      representam acoplamento a um business do workspace.
    approved_by: "squad-chief"
    approved_at: "2026-03-27"
  - scope: "authority/*.yaml"
    reason: "Authority files concentram claims históricos e social proof dos experts."
    approved_by: "squad-chief"
    approved_at: "2026-03-27"
  - scope: "reference/*.md"
    reason: "Reference docs armazenam material de calibração e documentação de frameworks."
    approved_by: "squad-chief"
    approved_at: "2026-03-27"
  - scope: "swipe-sources/*.yaml"
    reason: "Swipe sources preservam exemplos documentados usados para benchmarking de copy."
    approved_by: "squad-chief"
    approved_at: "2026-03-27"
  - scope: "swipe/*.md"
    reason: "Assets de swipe concentram exemplos extraídos e benchmarking, não lógica operacional do squad."
    approved_by: "squad-chief"
    approved_at: "2026-03-27"
  - scope: "archive/*.md"
    reason: "Artefatos arquivados mantêm histórico e não definem o comportamento operacional atual."
    approved_by: "squad-chief"
    approved_at: "2026-03-27"

