    - id: wf-evaluate-cpl
      name: "CPL Evaluation (Product Launch Formula)"
      duration: "30-60 min per CPL"
      description: "Deep evaluation of Pre-Launch Content using Production Aids"
      file: "workflows/wf-evaluate-cpl.yaml"
