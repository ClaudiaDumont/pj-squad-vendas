# ═══════════════════════════════════════════════════════════════════════════════
# ML SOP REGISTRY — Machine-Learned Execution Contracts
# ═══════════════════════════════════════════════════════════════════════════════
ml_sop_registry:
  enabled: true
  index_file: "sops/ml-sop-index.yaml"
  base_path: "sops"
  counts:
    total_contracts: 395
    by_tier:
      t0_diagnostic: 107
      t1_masters: 93
      t2_systematizers: 99
      t3_specialists: 96
    by_type:
      tasks: 128
      frameworks: 127
      decision_trees: 71
      checklists: 69
    templates: 19
    agent_tasks: 146
    agent_checklists: 18
    workflows: 6
  blending_rules:
    - id: "BR-001"
      rule: "Schwartz diagnostic MUST run before any draft SOP"
      enforcement: "BLOCKING"
      rationale: "Awareness level determines which SOP pathway is appropriate"
    - id: "BR-002"
      rule: "Kennedy 28-step and Hormozi grand-slam are mutually exclusive on same copy"
      enforcement: "BLOCKING"
      rationale: "Both impose conflicting structural requirements on the sales letter"
    - id: "BR-003"
      rule: "Research SOPs run before strategy SOPs (ordering)"
      enforcement: "SEQUENCING"
      rationale: "Strategy depends on research outputs; executing out of order produces generic copy"
  quality_enforcement:
    fail_fast: true
    escalate_to: "copy-chief"
    min_sop_compliance: 0.8
    violation_action: "BLOCK_AND_REPORT"

