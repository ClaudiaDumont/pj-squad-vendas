  # Decision Matrix (used to select workflow)
  decision_matrix:
    description: "5 questions to determine optimal workflow"
    questions:
      q1_awareness:
        label: "Awareness Level"
        options:
          - "Unaware"
          - "Problem Aware"
          - "Solution Aware"
          - "Product Aware"
          - "Most Aware"
        source: "Schwartz"

      q2_sophistication:
        label: "Market Sophistication"
        options:
          - "Stage 1 - First to Market"
          - "Stage 2 - Second to Market"
          - "Stage 3 - Market Matured"
          - "Stage 4 - Market Skeptical"
          - "Stage 5 - Market Exhausted"
        source: "Schwartz"

      q3_price_point:
        label: "Price Point"
        options:
          - "Low (<$100)"
          - "Mid ($100-$1000)"
          - "High ($1000-$5000)"
          - "Premium ($5000+)"

      q4_traffic:
        label: "Traffic Temperature"
        options:
          - "Cold"
          - "Warm"
          - "Hot"

      q5_output:
        label: "Primary Output"
        options:
          - "VSL"
          - "Sales Letter"
          - "Email Sequence"
          - "Ad Creative"
          - "Webinar"
          - "Direct Mail"
          - "Landing Page"
          - "Content"
          - "Funnel Optimization"

    recommendation_matrix:
      # Price Point → Traffic → Recommended Workflow
      "Premium + Any": "wf-3-high-ticket"
      "High + Cold": "wf-1-full-launch"
      "High + Warm": "wf-2-paid-traffic"
      "Mid + Cold": "wf-2-paid-traffic"
      "Mid + Warm": "wf-5-email-marketing"
      "Low + Cold": "wf-2-paid-traffic"
      "Low + Warm": "wf-4-organic-content"
      "Optimization": "wf-6-funnel-optimization"
      "Direct Mail": "wf-7-direct-mail"
      "Content Focus": "wf-4-organic-content"

  # Clone Combinations (proven synergies)
  clone_combinations:
    proven:
      - combo: "Schwartz + Anyone"
        reason: "Always diagnose awareness first"
        usage: "PHASE-1 of any workflow"

      - combo: "Todd Brown + Georgi"
        reason: "Mechanism + production"
        usage: "Strategy phases"

      - combo: "Halbert + Makepeace"
        reason: "Story + emotion"
        usage: "Long-form copy"

      - combo: "Chaperon + Settle"
        reason: "Hybrid email"
        usage: "Email marketing"

      - combo: "Bencivenga + Lampropoulos"
        reason: "Bullet power"
        usage: "Fascinations, sales pages"

      - combo: "Kennedy + Todd Brown"
        reason: "Avatar + differentiation"
        usage: "Market positioning"

      - combo: "Hopkins + Sugarman"
        reason: "Testing + triggers"
        usage: "Optimization phases"

      - combo: "Rutz + Deutsch"
        reason: "Direct mail volume"
        usage: "Magalogs, mailers"

    caution:
      - combo: "Halbert + Carlton same piece"
        reason: "Style conflict - both dominant voices"

      - combo: "Ogilvy + Makepeace"
        reason: "Tone conflict - elegant vs visceral"

      - combo: "All 30 Sugarman triggers"
        reason: "Overkill - creates distrust"

      - combo: "Settle + Chaperon same list"
        reason: "Confusing - daily vs automated"

  # Quality Gates per Phase
  quality_gates:
    phase_1_foundation:
      - "Awareness level diagnosed (Schwartz)"
      - "Market sophistication identified"
      - "Avatar research complete"
      - "Scientific framework set (Hopkins)"

    phase_2_strategy:
      - "Unique mechanism defined (Todd Brown)"
      - "Big idea validated"
      - "RMBC structure complete (Georgi)"

    phase_3_execution:
      - "Headlines tested (multi-clone)"
      - "Copy complete (VSL/Letter/Emails)"
      - "Bullets created (Bencivenga)"
      - "Emotion amplified (Makepeace)"

    phase_4_optimization:
      - "Hopkins audit complete"
      - "Sugarman triggers applied (15-20)"
      - "A/B tests configured"
      - "95% confidence metrics set"

  # Error Recovery
  error_recovery:
    on_blocked:
      - "Document blocker in progress.txt"
      - "Check reference files for patterns"
      - "Try alternative approach"
      - "If truly blocked, move to next task if no dependencies"
      - "NEVER output false completion promise"

    on_failure:
      - "Log error to progress.txt"
      - "Preserve state in copy-state.json"
      - "Create handoff with error context"
      - "Exit with code 2 for blocked, 1 for max iterations"

