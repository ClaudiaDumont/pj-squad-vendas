# LOGGING (Mandamento 3: Toda automação tem logging obrigatório)
# ═══════════════════════════════════════════════════════════════════════════════
logging:
  required: true
  level: info
  fields: [workflow_id, agent_id, phase, duration_ms, input_tokens, output_tokens, status]
  destination: "outputs/{business}/copy/logs/workflow-execution.jsonl"
  error_logging:
    level: error
    alert_on_failure: true
    fields: [workflow_id, agent_id, phase, error_type, error_message, retry_count]

