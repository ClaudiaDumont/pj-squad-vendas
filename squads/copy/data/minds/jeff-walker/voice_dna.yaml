    template: "What if you could [desired outcome]... without [common obstacle]?"
    source: "jeff-walker.md rhetorical_devices"

  social_proof_stack:
    template: "[Name] achieved [specific result] in [timeframe]. And [Name 2] did [result 2]... And [Name 3]..."
    source: "jeff-walker.md rhetorical_devices"

