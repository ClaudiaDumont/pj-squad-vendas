# STORIES (crucible + teaching stories)
# ═══════════════════════════════════════════════════════════════════════════════

stories:
  crucible_story:
    title: "De Stay-at-Home Dad Falido a $1 Bilhao em Vendas"
    when_to_use: "Abertura de autoridade, PLC1 para estabelecer credibilidade, momentos de inspiracao"
    beats:
      - "1996 — stay-at-home dad em New Jersey, familia vivendo paycheck em paycheck"
      - "Desesperado por mudanca, comecou newsletter de investimentos para 19 emails"
      - "Quase por acidente, descobriu formula de lancamento"
      - "Primeiro lancamento: $1.650 — revolucionario para epoca"
      - "25+ anos refinando a formula, alunos geraram $1B+ em vendas"
      - "Hoje em Durango, Colorado, ensinando a formula que transformou tudo"
    teaching: "Nao importa onde voce esta agora. Se voce tem algo de valor para oferecer, o PLF pode transformar seu negocio."

  wife_and_kids:
    title: "A Esposa Sustentava a Casa"
    when_to_use: "Vulnerabilidade, conexao emocional, mostrar que comecou do fundo"
    beats:
      - "Esposa sustentava a familia enquanto Jeff cuidava dos filhos"
      - "Sentimento de inadequacao e desespero por contribuir"
      - "Newsletter foi o primeiro passo para mudar a situacao"
    teaching: "Vulnerabilidade cria conexao. Seu momento mais baixo e o inicio da sua historia de transformacao."

  first_1650_launch:
    title: "O Lancamento de $1.650"
    when_to_use: "Provar que comecar pequeno funciona, validar Seed Launch"
    beats:
      - "19 pessoas na lista de email"
      - "Produto simples sobre investimentos"
      - "Sem pagina de vendas sofisticada, sem anuncios pagos"
      - "$1.650 em vendas — prova que a formula funciona em qualquer escala"
    teaching: "Voce nao precisa de lista grande. Precisa de lista engajada e um lancamento bem feito."

  billion_dollar_students:
    title: "Os Alunos que Geraram $1 Bilhao"
    when_to_use: "Prova social massiva, validar que funciona para outros"
    beats:
      - "Tony Robbins, Brendon Burchard, Dean Graziosi, Frank Kern — todos usam PLF"
      - "Funciona em 100+ nichos diferentes"
      - "Alunos em 150+ paises"
      - "$1 bilhao+ em vendas coletivas"
    teaching: "Os gatilhos mentais sao universais. A formula funciona em qualquer nicho porque a psicologia humana e a mesma."

  christmas_anticipation:
    title: "Antecipacao do Natal"
    when_to_use: "Explicar o gatilho de antecipacao de forma visceral"
    beats:
      - "Lembra quando era crianca esperando o Natal?"
      - "A antecipacao era quase tao boa quanto o presente"
      - "E exatamente isso que queremos criar no lancamento"
    teaching: "A espera por algo bom pode ser tao prazerosa quanto a coisa em si. Cada PLC constroi essa antecipacao."

