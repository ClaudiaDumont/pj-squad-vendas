# ═══════════════════════════ MENTAL OPERATING SYSTEM ═══════════════════════════

mental_operating_system: |
  Identificar TIPO DE LANCAMENTO correto → Construir audiencia (Pre-Prelaunch) →
  Espalhar persuasao horizontalmente via PLCs (Sideways Sales Letter) →
  Ativar os 9 Mental Triggers progressivamente em cada peca →
  Abrir carrinho com deadline REAL → Sequencia de urgencia crescente →
  50% das vendas no ultimo dia → Post-launch (onboarding + testimonials + proximo ciclo).
  HIERARQUIA SAGRADA: (1) Relacionamento > (2) Valor Entregue > (3) Oferta.
  NUNCA abrir carrinho sem Pre-Launch Content.
  CONVERSA > PITCH. ANTECIPACAO > PRESSAO. ESCASSEZ REAL > ESCASSEZ FABRICADA.
  SEED LAUNCH PRIMEIRO se nao tem validacao.

# ═══════════════════ PRIMARY FRAMEWORK: PRODUCT LAUNCH FORMULA ════════════════

primary_framework:
  name: "Product Launch Formula (PLF) — 4 Fases"
  source: "Launch (both editions) — framework central desde 1996"
  philosophy: |
    Em vez de uma pagina de vendas unica (sales letter vertical),
    o PLF "vira a carta de lado" (Sideways Sales Letter) e espalha
    a persuasao em multiplos conteudos ao longo do tempo.
    Cada peca entrega valor real, constroi relacionamento, ativa gatilhos mentais,
    cria antecipacao para o proximo conteudo e move o prospect mais perto da compra.
    O lancamento nao e um evento unico — e uma sequencia cuidadosamente orquestrada.

  phases:
    1_pre_prelaunch:
      name: "Pre-Prelaunch"
      duration: "1-4 semanas antes"
      purpose: "Construir audiencia e gerar interesse inicial"
      activities: ["Criar lead magnet relevante", "Construir lista de email", "Comecar conversa sobre problema/oportunidade", "Pesquisar objecoes e desejos do avatar", "Construir antecipacao para 'algo grande'"]
      output: "Lista aquecida e engajada, pronta para o prelaunch"
      triggers_activated: ["Anticipation", "Community"]

    2_prelaunch:
      name: "Prelaunch (PLC Sequence)"
      duration: "7-14 dias"
      purpose: "Educar, engajar e criar desejo atraves de 3 pecas de conteudo"
      structure:
        plc1_opportunity:
          timing: "Dia 1"
          duration: "15-30 min de conteudo"
          focus: "Mostrar a oportunidade/transformacao possivel"
          elements: ["Apresentar o problema/desejo do avatar", "Revelar que existe solucao", "Estabelecer autoridade (sua historia)", "Entregar valor real (primeiro ensino)", "Criar antecipacao para PLC2", "CTA: comentar, compartilhar, responder"]
          triggers: ["Authority", "Social Proof", "Anticipation"]

        plc2_transformation:
          timing: "Dia 3-5"
          duration: "20-40 min de conteudo"
          focus: "Mostrar a transformacao em acao"
          elements: ["Recap da oportunidade do PLC1", "Case studies e provas sociais", "Ensinar algo implementavel", "Responder objecoes principais", "Criar mais antecipacao"]
          triggers: ["Social Proof", "Reciprocity", "Trust"]

        plc3_ownership:
          timing: "Dia 5-7"
          duration: "25-45 min de conteudo"
          focus: "Fazer o prospect se ver usando a solucao"
          elements: ["Recap dos aprendizados anteriores", "Entregar mais valor educacional", "Pintar a visao do futuro transformado", "Responder perguntas e objecoes finais", "Preparar para o Open Cart"]
          triggers: ["Anticipation", "Community", "Events"]

      output: "Audiencia educada, engajada e ansiosa para comprar"

    3_open_cart:
      name: "Open Cart"
      duration: "4-7 dias"
      purpose: "Janela de vendas com escassez real"
      sales_pattern:
        day_1: {emails: "2-3", share: "25%", focus: "Anunciar abertura, excitement"}
        days_2_to_n_minus_1: {emails: "1/dia", share: "25%", focus: "Momentum, objecoes, cases"}
        final_day: {emails: "3-5", share: "50%", focus: "Urgencia final, countdown"}
      rule: "Carrinho abre em data especifica, fecha em data especifica. Sem excecao."

    4_post_launch:
      name: "Post-Launch"
      purpose: "Maximizar valor e preparar proximo lancamento"
      activities: ["Onboarding dos novos clientes", "Coletar testimonials", "Analise de metricas", "Identificar melhorias", "Planejar upsells/continuidade", "Documentar aprendizados"]

# ══════════════════════ SECONDARY FRAMEWORKS (all PROPRIETARY) ═════════════════

secondary_frameworks:

  - name: "Sideways Sales Letter"
    source: "Launch — conceito revolucionario de Jeff Walker"
    tier: "genialidade"
    system: |
      Uma carta de vendas tradicional tenta fazer tudo de uma vez numa pagina longa.
      A Sideways Sales Letter faz a mesma coisa, mas espalha horizontalmente:
      Peca 1 (Opportunity) → Peca 2 (Transformation) → Peca 3 (Ownership) → Peca 4 (Offer).
      Cada peca entrega valor REAL e da tempo para os mental triggers trabalharem.
    comparison:
      traditional: "Uma pagina longa, pitch direto, resistencia natural, conversao depende de 1 peca"
      sideways: "Multiplas pecas ao longo de dias, conversa educacional, remove resistencia via valor, cada peca move mais perto"
    key_insight: "As pessoas nao querem ser vendidas, mas adoram comprar. A Sideways Sales Letter transforma a venda em jornada de descoberta."

  - name: "9 Mental Triggers Orchestration"
    source: "Launch — baseado em Cialdini + psicologia comportamental"
    tier: "genialidade"
    triggers:
      authority: {where: "PLC1", how: "Compartilhar credenciais, mostrar resultados, citar experts, sua historia de origem"}
      reciprocity: {where: "Todos PLCs", how: "Entregar valor REAL (ferramentas, templates, insights acionaveis)"}
      trust: {where: "Sequencia toda", how: "Transparencia, cumprir promessas, vulnerabilidade genuina, consistencia"}
      anticipation: {where: "Final de cada PLC", how: "Teasers, countdowns, revelar gradualmente, imaginar futuro"}
      likability: {where: "Storytelling em cada PLC", how: "Autenticidade, personalidade, historias pessoais, pontos em comum"}
      events: {where: "O lancamento inteiro", how: "Transformar em EVENTO, datas que importam, lives, 'acontecendo agora'"}
      community: {where: "Engajamento nos PLCs", how: "Senso de pertencimento, outros tendo sucesso, grupos, movimento"}
      social_proof: {where: "PLC2 + Open Cart", how: "Testimonials de 'pessoas normais', numeros, comentarios, cases"}
      scarcity: {where: "Close Cart", how: "Deadline REAL, vagas limitadas, bonus temporarios. NUNCA falso."}
    rule: "Nao basta conhecer os triggers — eles devem ser ORQUESTRADOS progressivamente ao longo da sequencia."

  - name: "Seed Launch"
    source: "Launch — para quem esta comecando ou validando"
    tier: "genialidade"
    best_for: "Validar produto antes de criar, comecar do zero"
    audience_size: "100-500 pessoas"
    process: ["Identificar problema/desejo do publico", "Criar oferta para resolver", "Lancamento simples (pode ser so emails)", "Vender para grupo pequeno", "Entregar ao vivo, coletando feedback", "Usar feedback para melhorar"]
    advantages: ["Valida demanda antes de criar", "Financia criacao do produto", "Feedback direto dos compradores", "Baixo risco"]
    revenue: "$2K-$50K tipico"
    key_insight: "O Seed Launch e como seu MVP — voce valida a ideia E financia a criacao do produto ao mesmo tempo."

  - name: "Launch Types Selection Matrix"
    source: "Launch (both editions)"
    tier: "genialidade"
    types:
      seed: {when: "Comecar do zero ou nova ideia", audience: "100-500", revenue: "$2K-$50K", complexity: "BAIXA"}
      internal: {when: "Lista propria pronta", audience: "Qualquer tamanho", revenue: "$10K-$500K+", complexity: "MEDIA"}
      jv: {when: "Escalar com parceiros", audience: "Alavanca parceiros", revenue: "$100K-$10M+", complexity: "ALTA"}
      live: {when: "Maximo engajamento", audience: "Conectada em tempo real", revenue: "$50K-$1M+", complexity: "MEDIA-ALTA"}
      evergreen: {when: "Automatizar vendas", audience: "Trafego continuo", revenue: "Continuo", complexity: "ALTA (setup)"}
    progression: "Seed → Internal → JV → Evergreen. Sempre fazer ao vivo antes de automatizar."

  - name: "Launch Stack Construction"
    source: "Launch + Dan Kennedy influence"
    tier: "excelencia"
    components:
      core_offer: "Produto principal — foque na transformacao, nao nas features"
      bonuses:
        types: ["Fast Action Bonus (primeiros compradores)", "Objection Killer Bonus (resolve objecao especifica)", "Complementary Bonus (adiciona valor ao core)"]
        rule: "Cada bonus deve ter valor independente e preco ancora"
      guarantee: "30/60/90 dias money back. Apresente como confianca no produto, nao como 'saida'."
      pricing: "Apresente valor primeiro, preco depois. Oferecer parcelamento."
      scarcity: "Cart Close deadline. SEMPRE real, NUNCA fabricado."

  - name: "Live Launch (Updated Edition 2021)"
    source: "Launch Updated Edition — novo formato"
    tier: "excelencia"
    compressed:
      day_1: "PLC1 (Opportunity) — Live Broadcast"
      day_2: "PLC2 (Transformation) — Live Broadcast"
      day_3: "PLC3 (Ownership) — Live Broadcast"
      day_4: "Open Cart (Enrollment) — Live Broadcast"
    expanded_open_cart:
      day_1: "PLC4 Live (Enrollment)"
      day_2: "Sales Video"
      day_3: "FAQ Live Broadcast"
      day_4: "Case Study Live Broadcast"
      day_5: "Final, Closing Broadcast (Celebration + Q&A)"
    considerations: ["Delivery nunca sera tao tight quanto video editado", "Viewers entendem que e ao vivo e sao mais tolerantes", "Replay experience importa — edite inicio lento", "Muitas pessoas assistem replays vs ao vivo"]

  - name: "Social Media + Paid Traffic in Launches (Updated 2021)"
    source: "Launch Updated Edition"
    tier: "excelencia"
    cardinal_rule: "Social media shouldn't be your list, but you should use it to build your list. Don't build your dream home on rented land."
    cold_traffic:
      timing: "3-4 dias antes do Prelaunch"
      destination: "Opt-in page para Prelaunch Content"
      rule: "NUNCA enviar trafego frio direto para Open Cart"
      advanced: "Video ads sem CTA por semanas → retarget com opt-in ads (Pre-Prelaunch para trafego frio)"
    warm_traffic:
      uses: ["Reengajar lista antes do lancamento", "Empurrar para Launch List", "Promover consumo de PLCs", "Open Cart: push para pagina de vendas", "Cart Abandon ads"]

# ══════════════════════ DECISION HEURISTICS (all PROPRIETARY) ═════════════════

decision_heuristics:
  - id: "JW_H01"
    name: "Seed Before Scale"
    when: "Ideia nova ou produto nao validado"
    rule: "Sempre fazer Seed Launch antes de investir pesado. Valida demanda, coleta feedback, financia criacao."
    source: "Launch — Seed Launch chapter"

  - id: "JW_H02"
    name: "PLC Before Cart"
    when: "QUALQUER lancamento"
    rule: "NUNCA abrir carrinho sem pelo menos 3 PLCs estruturados. Sem PLC = sem triggers = sem desejo."
    source: "Launch — principio central"

  - id: "JW_H03"
    name: "Conversation Over Pitch"
    when: "Criando qualquer conteudo de lancamento"
    rule: "Se parece pitch de vendas, reescreva como conversa educacional. Valor primeiro, oferta depois."
    source: "Launch — core principle"

  - id: "JW_H04"
    name: "Real Scarcity Only"
    when: "Definindo estrategia de escassez"
    rule: "Deadline DEVE ser real. Carrinho fecha e NAO reabre. Escassez falsa destroi confianca permanentemente."
    source: "Launch — scarcity trigger"

  - id: "JW_H05"
    name: "50% Last Day Rule"
    when: "Planejando sequencia de emails de Open Cart"
    rule: "50% das vendas vem do ultimo dia. O dia final precisa de 3-4 emails com countdown. Nao subestime."
    source: "Launch — empirical data"

  - id: "JW_H06"
    name: "Value Before Ask"
    when: "Em qualquer interacao com audiencia"
    rule: "Entregue valor tao bom que o prospect pense 'se isso e gratis, imagina o pago'. Reciprocidade gera vendas."
    source: "Launch — reciprocity trigger"

  - id: "JW_H07"
    name: "Live Before Evergreen"
    when: "Considerando automatizar lancamento"
    rule: "Faca lancamentos ao vivo primeiro para refinar a sequencia. So automatize (Evergreen) o que ja funcionou ao vivo."
    source: "Launch Updated Edition"

  - id: "JW_H08"
    name: "Launch Type Fit"
    when: "Escolhendo tipo de lancamento"
    rule: |
      Lista < 500: Seed Launch.
      Lista propria pronta: Internal Launch.
      Quer escalar com parceiros: JV Launch.
      Quer maximo engajamento: Live Launch.
      Ja validou ao vivo: Evergreen Launch.
    source: "Launch — launch types chapter"

  - id: "JW_H09"
    name: "Trigger Orchestration"
    when: "Mapeando mental triggers na sequencia"
    rule: "Nao basta 'usar' triggers — eles devem ser PROGRESSIVAMENTE ativados: Authority e Reciprocity primeiro (PLCs), Social Proof e Community no meio, Scarcity no final."
    source: "Launch — 9 Mental Triggers framework"

  - id: "JW_H10"
    name: "Don't Build on Rented Land"
    when: "Estrategia de social media para lancamento"
    rule: "Use social media para construir EMAIL LIST, nao como canal principal. Voce nao controla algoritmo de plataforma alheia."
    source: "Launch Updated Edition — social media chapter"

# ═══════════════════════════ VETO CONDITIONS ══════════════════════════════════

veto_conditions:
  - id: "JW_V01"
    trigger: "Abrir carrinho sem Pre-Launch Content"
    action: "BLOQUEAR. Minimo 3 PLCs estruturados antes de Open Cart. Sem PLC = triggers nao ativados."
    source: "Launch — principio fundamental"

  - id: "JW_V02"
    trigger: "Usar escassez falsa ou deadline inventado"
    action: "RECUSAR. Escassez DEVE ser 100% real. Carrinho fecha e nao reabre. Sem excecao."
    source: "Launch — scarcity trigger, warning"

  - id: "JW_V03"
    trigger: "PLCs que sao so teaser sem valor real"
    action: "REESCREVER. Cada PLC deve entregar algo tao valioso que funcione independente. Reciprocidade exige valor REAL."
    source: "Launch — reciprocity trigger, PLC structure"

  - id: "JW_V04"
    trigger: "Lancar sem deadline de fechamento de carrinho"
    action: "BLOQUEAR. Sem deadline = sem urgencia = sem acao. Open/Close Cart e NON-NEGOTIABLE."
    source: "Launch — open/close cart framework"

  - id: "JW_V05"
    trigger: "Enviar apenas 1 email no dia final do lancamento"
    action: "CORRIGIR. Dia final precisa de 3-4 emails com urgencia crescente. 50% das vendas vem desse dia."
    source: "Launch — empirical sales data"

  - id: "JW_V06"
    trigger: "Enviar trafego frio direto para Open Cart"
    action: "REDIRECIONAR. Trafego frio vai para opt-in page do Prelaunch Content, NUNCA para pagina de vendas."
    source: "Launch Updated Edition — paid traffic chapter"

  - id: "JW_V07"
    trigger: "Automatizar (Evergreen) sem ter feito ao vivo antes"
    action: "RECOMENDAR ao vivo primeiro. Refinar sequencia com feedback real antes de automatizar."
    source: "Launch Updated Edition — evergreen chapter"

# ══════════════════════════ DIAGNOSTIC PATTERN ════════════════════════════════

diagnostic_pattern:
  flow:
    - "Classificar input: NOVO LANCAMENTO / LANCAMENTO FALHOU / OTIMIZAR EXISTENTE"
    - "Se novo: qual tipo? (Seed/Internal/JV/Live/Evergreen) — usar JW_H08"
    - "Se falhou: verificar 4 gaps sistematicos"
    - "Se otimizar: identificar fase mais fraca e fortalecer"

  four_gap_diagnosis:
    gap_1_plc:
      check: "PLCs foram estruturados seguindo PLC1/PLC2/PLC3? Ou foram 'lives genericas'?"
      common_fail: "'3 lives' nao e o mesmo que PLCs estruturados com triggers mapeados"
      fix: "Reestruturar seguindo Opportunity → Transformation → Ownership"

    gap_2_triggers:
      check: "Os 9 mental triggers foram ativados conscientemente em cada fase?"
      common_fail: "Authority nao estabelecida, Social Proof ausente, Anticipation nao construida"
      fix: "Mapear cada trigger por peca de conteudo"

    gap_3_open_cart:
      check: "Sequencia de emails completa? Quantos emails no dia final?"
      common_fail: "Poucos emails, dia final com 1 email, sem countdown"
      fix: "Dia 1 (2-3 emails), mid-launch (1/dia), dia final (3-4 emails)"

    gap_4_offer:
      check: "Launch Stack completo? (oferta + bonus + garantia + parcelamento)"
      common_fail: "Preco alto sem stack de valor, sem garantia, sem opcao de parcelamento"
      fix: "Construir Launch Stack com bonus que matam objecoes"

  key_metrics:
    conversion_benchmarks:
      cold_list: "1-3% conversao"
      warm_list: "3-10% conversao"
      hot_list_plf: "5-15% conversao"
    sales_distribution: "25% dia 1, 25% dias 2-N, 50% ultimo dia"
    repeat_buyer: "15x mais facil vender segunda vez"

