# Token Registry — Copy Squad
# Materializa a camada de tokens do contrato operacional do squad
# Gerado na remediação P1 do audit SINKRA

meta:
  contract_source: "direct-squad-audit-p1-remediation"
  version: "1.0.0"
  total_tokens: 18
  token_types: [Taxonomy, Threshold, Time, Behavior, Accountability]  # remapped: Data → Taxonomy [HUB-003]
  handoff_persistence: "projects/{project}/token-state.json"
  default_human_accountable: "launch-owner"
  default_worker_handoff: "copy-ops-worker"

constants:
  time:
    TK-TIME-001: { name: human_review_sla_hours, value: 24, unit: hours }
    TK-TIME-002: { name: package_handoff_sla_hours, value: 8, unit: hours }
    TK-TIME-003: { name: experiment_validation_window_days, value: 7, unit: days }

  threshold:
    TK-THR-001: { name: briefing_completeness_pct_min, value: 0.90, unit: ratio }
    TK-THR-002: { name: awareness_alignment_score_min, value: 0.80, unit: ratio }
    TK-THR-003: { name: mechanism_clarity_score_min, value: 0.75, unit: ratio }
    TK-THR-004: { name: proof_points_min, value: 3, unit: count }
    TK-THR-005: { name: deliverable_completeness_pct_min, value: 0.95, unit: ratio }
    TK-THR-006: { name: evaluation_evidence_refs_min, value: 5, unit: count }
    TK-THR-007: { name: voice_match_score_min, value: 0.85, unit: ratio }
    TK-THR-008: { name: testable_hypotheses_min, value: 1, unit: count }

  behavior:
    TK-BEH-001: { name: human_review_required_on_blocking_checkpoint, value: true }
    TK-BEH-002: { name: worker_package_required_before_handoff, value: true }
    TK-BEH-003: { name: unsupported_claims_trigger_veto, value: true }

  taxonomy:
    TK-TAX-001: { name: domain_strategy, value: Strategic }
    TK-TAX-002: { name: domain_execution, value: Tactical }
    TK-TAX-003: { name: domain_handoff, value: Operational }

tokens:
  - token_id: "TKC-001"
    token_type: Data
    family: Taxonomy  # remapped: Data → Taxonomy [HUB-003]
    token_name: launch_foundation_token
    token_value: foundation_ready
    domain: Strategic
    produced_by: "wf-1-full-launch.foundation"
    consumed_by: ["wf-1-full-launch.strategy"]
    handoff_key: "launch_foundation"
    persistence: runtime
    constraint: "TK-THR-001"
    description: "Confirma que o contexto base do launch foi mapeado antes de definir mecanismo e big idea."

