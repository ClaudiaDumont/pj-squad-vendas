  direct_mail_volume: ["Rutz", "Deutsch"]
  health_copy: ["Makepeace", "Lampropoulos"]
  financial_copy: ["Makepeace", "Deutsch"]
  objection_handling: "Bencivenga"
  avatar_development: "Kennedy"
  differentiation: "Todd Brown"
  production_scale: "Georgi"
  aggressive_copy: "Carlton"
  vsl_video: "Jon Benson"
  daily_email: "Ben Settle"
  automated_sequences: "Andre Chaperon"
  premium_b2b: "David Ogilvy"

selection_by_awareness_level:
