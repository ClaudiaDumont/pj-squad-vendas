rubric:
  name: cta-strength
  threshold: 0.7
  weight: 1
  max_tokens: 150

prompt: |
  You are evaluating the output of an AI pipeline phase.

  Task: {{task_description}}
  Expected fields: {{expected_fields}}

  Output (first 2000 chars):
  {{output_preview}}

  Score 0-100 on CTA STRENGTH: Does the copy contain strong, clear calls to action?
  Check for: action verbs, benefit-oriented language, visible CTA placement,
  and alignment between CTA and the overall copy objective.
  Respond with JSON only: {"score": N, "reason": "one line"}
