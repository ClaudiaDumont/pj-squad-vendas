sop:
  id: "dk-28-step-sales-letter"
  version: "1.0.0"
  title: "28-Step Sales Letter System"
  purpose: "Construct a complete long-form sales letter using Dan Kennedy's 28-step structural framework, from avatar research through final skeptic review"
  classification:
    domain: "copywriting"
    category: "systematizer"
    sub_category: "sales-letter"
    risk_level: "medium"
  status: "ACTIVE"
  trigger:
    type: "manual"
    description: "When a new long-form sales letter is needed for a product/service, or when rebuilding an underperforming sales letter"
  context:
    input:
      - name: "product_details"
        type: "object"
        required: true
        description: "Complete product/service information including features, pricing, and delivery mechanism"
      - name: "target_market"
        type: "object"
        required: true
        description: "Demographics, psychographics, and behavioral data about the ideal buyer"
      - name: "smart_questions_completed"
        type: "object"
        required: true
        description: "Completed 10 Smart Questions avatar discovery worksheet"
  steps:
    - id: "S001"
      name: "Get Into the Customer"
      action: "build_3d_avatar"
      description: "Using completed 10 Smart Questions, build a three-dimensional avatar with exact phrases the prospect uses. Spend minimum 30 minutes."
      performer: "copywriter"
      critical: true
      on_success: "S002"
      on_failure: "retry"
    - id: "S002"
      name: "Get Into the Offer"
      action: "list_all_benefits"
      description: "List every benefit including second-level benefits. For each benefit ask 'what does THAT mean?' Minimum 20 benefits total."
      performer: "copywriter"
      critical: false
      on_success: "S003"
      on_failure: "retry"
    - id: "S003"
      name: "Craft Damaging Admission"
      action: "identify_and_admit_weakness"
      description: "Find a genuine weakness or limitation and write an honest admission to be placed early in the letter for trust-building."
      performer: "copywriter"
      critical: false
      on_success: "S004"
      on_failure: "retry"
    - id: "S004"
      name: "Identify Dominant Emotion"
      action: "select_emotional_driver"
      description: "From the 10 Smart Questions, identify the single strongest emotional driver: fear, anger, desire, frustration, or aspiration."
      performer: "copywriter"
      critical: false
      on_success: "S005"
      on_failure: "retry"
    - id: "S005"
      name: "Define USP"
      action: "articulate_differentiation"
      description: "Write why the offer is DIFFERENT (not better). Format: 'Unlike [competitors], we [unique approach] which means [benefit].' Test: could competitor say the same?"
      performer: "copywriter"
      critical: false
      on_success: "S006"
      on_failure: "retry"
    - id: "S006"
      name: "Build Irresistible Offer"
      action: "stack_offer_value"
      description: "Stack core product, bonuses, guarantees, and urgency so total perceived value exceeds price by at least 10x."
      performer: "copywriter"
      critical: true
      on_success: "S007"
      on_failure: "retry"
    - id: "S007"
      name: "Flag the Reader"
      action: "write_reader_identification"
      description: "Write opening identification line that instantly tells the right reader 'this is for YOU' using specific identifiers."
      performer: "copywriter"
      critical: false
      on_success: "S008"
      on_failure: "retry"
    - id: "S008"
      name: "Write Headline"
      action: "craft_headline_candidates"
      description: "Craft headline combining benefit promise, curiosity, and urgency. Write minimum 10 candidates. Must pass 'would I stop and read this?' test."
      performer: "copywriter"
      critical: true
      on_success: "S009"
      on_failure: "retry"
    - id: "S009"
      name: "Enter the Conversation"
      action: "join_internal_dialogue"
      description: "Identify what prospect is already thinking about this problem and open the letter by joining that existing internal conversation."
      performer: "copywriter"
      critical: false
      on_success: "S010"
      on_failure: "retry"
    - id: "S010"
      name: "Demonstrate Deep Understanding"
      action: "mirror_prospect_pain"
      description: "Articulate prospect's pain and situation in their own language so they think 'this person understands exactly what I'm going through.'"
      performer: "copywriter"
      critical: false
      on_success: "S011"
      on_failure: "retry"
    - id: "S011"
      name: "Agitate the Problem"
      action: "intensify_cost_of_inaction"
      description: "Describe cost of NOT acting. Project forward: what happens in 6 months, 1 year, 5 years if they do nothing?"
      performer: "copywriter"
      critical: false
      on_success: "S012"
      on_failure: "retry"
    - id: "S012"
      name: "Present Credentials"
      action: "establish_authority_via_results"
      description: "Establish authority through RESULTS, not diplomas. Lead with specific outcomes and numbers achieved for clients."
      performer: "copywriter"
      critical: false
      on_success: "S013"
      on_failure: "retry"
    - id: "S013"
      name: "Convert Features to Benefits"
      action: "translate_features"
      description: "Rewrite every feature as a benefit: '[Feature] which means [what it does for you].' Every technical detail needs human-impact translation."
      performer: "copywriter"
      critical: false
      on_success: "S014"
      on_failure: "retry"
    - id: "S014"
      name: "Build Social Proof Stack"
      action: "compile_testimonials"
      description: "Compile minimum 5 testimonials and 2 case studies. Arrange to address different objections and customer segments. Include specific numbers."
      performer: "copywriter"
      critical: false
      on_success: "S015"
      on_failure: "retry"
    - id: "S015"
      name: "Reveal Irresistible Offer"
      action: "present_value_stack"
      description: "Present each component with individual value. Build total perceived value (10x+ price). Reveal actual price as dramatic contrast."
      performer: "copywriter"
      critical: true
      on_success: "S016"
      on_failure: "retry"
    - id: "S016"
      name: "Stack the Bonuses"
      action: "add_standalone_bonuses"
      description: "Add bonuses each desirable enough to purchase independently. Each addresses a specific objection or accelerates a result."
      performer: "copywriter"
      critical: false
      on_success: "S017"
      on_failure: "retry"
    - id: "S017"
      name: "Build Urgency Stack"
      action: "layer_urgency_drivers"
      description: "Layer real deadline + genuine scarcity + penalty for delay + expiring bonus. Each must be truthful and enforceable."
      performer: "copywriter"
      critical: false
      on_success: "S018"
      on_failure: "retry"
    - id: "S018"
      name: "Engineer Risk Reversal"
      action: "craft_guarantee"
      description: "Remove ALL perceived risk. Guarantee must be specific, generous, and easy to understand."
      performer: "copywriter"
      critical: false
      on_success: "S019"
      on_failure: "retry"
    - id: "S019"
      name: "Write CTA"
      action: "command_action"
      description: "Write direct command CTA, not suggestion. 'Click the button and complete your order now' — make action steps crystal clear."
      performer: "copywriter"
      critical: false
      on_success: "S020"
      on_failure: "retry"
    - id: "S020"
      name: "Write the Close"
      action: "summarize_and_close"
      description: "Summarize three most compelling benefits, restate urgency, reinforce guarantee."
      performer: "copywriter"
      critical: false
      on_success: "S021"
      on_failure: "retry"
    - id: "S021"
      name: "Write P.S. Stack"
      action: "write_postscripts"
      description: "Write 3-5 P.S. lines with specific functions: urgency, guarantee, social proof, alternative CTA, personal note."
      performer: "copywriter"
      critical: false
      on_success: "S022"
      on_failure: "retry"
    - id: "S022"
      name: "Design Response Device"
      action: "create_response_channels"
      description: "Enable response via multiple channels: online form, phone, QR code, reply email. Remove all friction."
      performer: "copywriter"
      critical: false
      on_success: "S023"
      on_failure: "retry"
    - id: "S023"
      name: "Clarity Check"
      action: "read_aloud_test"
      description: "Read entire letter aloud. Every stumble point must be rewritten until it flows as natural speech."
      performer: "copywriter"
      critical: false
      on_success: "S024"
      on_failure: "retry"
    - id: "S024"
      name: "Verify Emotional Temperature"
      action: "check_intensity_progression"
      description: "Confirm emotional intensity RISES progressively. Opening is calm and relatable; close is urgent and compelling."
      performer: "copywriter"
      critical: false
      on_success: "S025"
      on_failure: "retry"
    - id: "S025"
      name: "Test Headlines"
      action: "prepare_headline_variants"
      description: "Select 3-5 best headline candidates for testing. Each takes different angle: benefit, curiosity, urgency, story, contrarian."
      performer: "copywriter"
      critical: false
      on_success: "S026"
      on_failure: "retry"
    - id: "S026"
      name: "Verify All Claims"
      action: "substantiate_claims"
      description: "Every factual claim, statistic, result, and promise must have supporting proof. Remove or substantiate unproven claims."
      performer: "copywriter"
      critical: true
      on_success: "S027"
      on_failure: "retry"
    - id: "S027"
      name: "Add Tracking"
      action: "implement_tracking"
      description: "Add unique tracking mechanism per version/placement: unique URLs, phone numbers, coupon codes, or reference numbers."
      performer: "copywriter"
      critical: false
      on_success: "S028"
      on_failure: "retry"
    - id: "S028"
      name: "Final No BS Review"
      action: "skeptic_review"
      description: "Read as the most skeptical, cynical prospect. Challenge every claim, question every promise, fix anything that fails scrutiny."
      performer: "copywriter"
      critical: true
      on_success: "END"
      on_failure: "retry"
  error_handling:
    global_timeout: "PT8H"
    retry_policy:
      max_retries: 2
      backoff: "linear"
  quality_gate:
    enabled: true
    criteria:
      - name: "all_28_steps_complete"
        type: "boolean"
        target: true
        weight: 0.3
      - name: "proof_per_claim"
        type: "boolean"
        target: true
        weight: 0.25
      - name: "value_stack_10x"
        type: "boolean"
        target: true
        weight: 0.2
      - name: "emotional_temperature_rises"
        type: "boolean"
        target: true
        weight: 0.15
      - name: "clarity_check_passed"
        type: "boolean"
        target: true
        weight: 0.1
    pass_threshold: 0.85
  outputs:
    artifacts:
      - name: "complete_sales_letter"
        type: "file"
        format: "md"
        description: "Full sales letter with all 28 structural components"
      - name: "headline_variants"
        type: "list"
        format: "md"
        description: "3-5 headline candidates for split testing"
