sop:
  id: collier-follow-up-sequence
  version: "1.0"
  date: "2026-03-14"
  author:
    agent: sop-converter
    squad: sop-factory
  title: "Follow-Up Sequence Protocol (5 Letters)"
  purpose: >
    Plan multi-letter follow-up sequence with different angles per letter.
    Single letters are rarely sufficient; rotating angles dramatically
    increase total conversion through cumulative effect.
  classification:
    domain: copywriting
    category: diagnostic
    tier: T0
    source_agent: robert-collier
    artifact_type: task

  steps:
    - id: letter_1
      action: plan_primary_appeal
      description: "Deploy STRONGEST angle first. Dominant desire/fear. Expected ~3-4% response."
      inputs:
        - product_offer
        - prospect_profile
        - available_angles
      critical: true
      output: letter_1_plan

    - id: letter_2
      action: plan_second_angle
      description: "Completely different angle — different motive, benefit, or proof set. Expected ~2.5%."
      depends_on: letter_1
      output: letter_2_plan

    - id: letter_3
      action: plan_third_angle
      description: "Another new angle — new story, case study, or different demographic proof. Expected ~1.5%."
      depends_on: letter_2
      output: letter_3_plan

    - id: letter_4
      action: plan_urgency_angle
      description: "Urgency/scarcity: specific deadline, limited quantity, or price increase. Expected ~1%. Must be REAL."
      depends_on: letter_3
      critical: true
      output: letter_4_plan

    - id: letter_5
      action: plan_mopping_up_letter
      description: "LONG exhaustive letter recapping all angles, benefits, proofs. 2-3x longer. Expected ~2%."
      depends_on: letter_4
      output: letter_5_plan

    - id: assess_continuation
      action: evaluate_sequence_extension
      description: "Beyond 5 letters: rarely profitable. File leads if response <0.5% per letter."
      depends_on: letter_5
      output: continuation_assessment

  error_handling:
    - error: saved_best_for_later
      symptom: "Letter 1 is weak; best material appears in Letter 3-4"
      resolution: "Always deploy strongest angle first; most prospects lost after Letter 1"
    - error: same_angle_reworded
      symptom: "All letters lead with same benefit, just different words"
      resolution: "Force completely different prime motive for each letter"
    - error: fake_urgency
      symptom: "'Limited time!' without real deadline or consequence"
      resolution: "Specify exact date, quantity, or penalty"
    - error: short_letter_5
      symptom: "Mopping-up letter is brief 'last chance' reminder"
      resolution: "Letter 5 must be longest, most comprehensive in sequence"

  quality_gate:
    criteria:
      - "Each letter uses genuinely different angle"
      - "Letter 1 uses strongest angle"
      - "Letter 4 has real, specific urgency"
      - "Letter 5 is comprehensive and long"
      - "Response rates documented per letter"
      - "Cumulative conversion projected"
    pass_threshold: "All criteria met"

  outputs:
    - name: sequence_plan
      format: five_letter_plan
      description: "Angle per letter with content summary"
    - name: response_projections
      format: rate_table
      description: "Expected response rate per letter"
    - name: cumulative_projection
      format: calculation
      description: "Total cumulative conversion estimate"
