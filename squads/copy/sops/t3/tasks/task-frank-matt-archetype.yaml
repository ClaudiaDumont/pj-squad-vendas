sop:
  id: task-frank-matt-archetype
  version: "1.0"
  title: "Frank & Matt Archetype Definition"
  purpose: "Define two character archetypes representing prospect's current state (Frank) and transformed state (Matt) to anchor all narrative email copy"
  classification:
    domain: copywriting
    category: specialist
    source_agent: andre-chaperon
    tier: T3

  inputs:
    - name: audience_research
      type: document
      required: true
      description: "Audience surveys, interviews, VOC data"
    - name: transformation_promise
      type: object
      required: true
      description: "Product's specific transformation promise"

  outputs:
    - name: frank_archetype
      type: document
      description: "Frank character profile with 3-5 vivid scenes (before state)"
    - name: matt_archetype
      type: document
      description: "Matt character profile with 3-5 vivid scenes (after state)"
    - name: bridge_narrative
      type: document
      description: "Product as mechanism connecting Frank to Matt"

  steps:
    - id: step_1
      action: define_frank
      description: "Create vivid character for current painful state with daily scenes, internal dialogue, physical sensations"
      critical: true
      error_handling:
        condition: "Frank is too extreme or caricatured"
        action: "Base on real survey/interview data, make relatable not cartoonish"

    - id: step_2
      action: define_matt
      description: "Create transformed character with same scene types showing changed reality — aspirational but achievable"
      critical: true
      error_handling:
        condition: "Matt is unrealistically perfect"
        action: "Show Matt with normal challenges, just without the core problem"

    - id: step_3
      action: map_product_bridge
      description: "Position product as specific mechanism taking Frank to Matt with defined changes and timeline"

    - id: step_4
      action: write_vivid_scenes
      description: "Write 3-5 scenes per archetype with sensory detail, internal dialogue, social interactions"
      min_scenes_per_archetype: 3

    - id: step_5
      action: anchor_narrative
      description: "Establish Frank/Matt as constant reference points for all email and sales copy"

  quality_gate:
    min_score: 7
    max_score: 10
    checks:
      - "Frank feels specific and real not caricature"
      - "Matt feels achievable not fantasy"
      - "Product bridge is logical and specific"
      - "At least 3 vivid scenes per archetype"
      - "Internal dialogue included in scenes"
      - "Archetypes derived from real research"
    verdict:
      pass: "score >= 7"
      fail: "score < 7"

  dependencies: []

  related_sops:
    - task-soap-opera-sequence
    - task-email-engine-setup
    - task-mht-exercise
    - task-voc-first-email
