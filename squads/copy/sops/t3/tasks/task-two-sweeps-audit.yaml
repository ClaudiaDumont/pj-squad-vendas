sop:
  id: task-two-sweeps-audit
  version: "1.0"
  title: "Two Sweeps Audit (So What + Specificity)"
  purpose: "Improve any copy through two sequential passes — eliminating features without outcomes and replacing generalities with sensory specifics"
  classification:
    domain: copywriting
    category: specialist
    source_agent: ry-schwartz
    tier: T3

  inputs:
    - name: copy_draft
      type: document
      required: true
      description: "Any copy draft to audit"

  outputs:
    - name: audited_copy
      type: document
      description: "Copy with all sentences passing both So What and Specificity tests"

  steps:
    - id: step_1
      action: sweep_so_what
      description: "Read every sentence, ask 'So what?' — rewrite any feature without concrete reader outcome"
      critical: true
      error_handling:
        condition: "Sentence describes feature without outcome"
        action: "Rewrite to connect feature to concrete benefit, result, or life implication"

    - id: step_2
      action: sweep_specificity
      description: "Read every sentence again, ask 'Can I be more specific?' — replace generalities with visual/sensory/numerical detail"
      critical: true
      error_handling:
        condition: "Sentence uses vague language"
        action: "Replace with visual, sensory, or numerical specificity that creates mental image"

  constraints:
    - "Complete Sweep 1 fully before starting Sweep 2"
    - "Binary test — passes or fails, no partial credit"
    - "Sweep EVERY sentence including transitions and CTAs"

  quality_gate:
    min_score: 7
    max_score: 10
    checks:
      - "Every sentence passes So What test"
      - "Every sentence passes specificity test"
      - "Features connected to concrete outcomes"
      - "Generalities replaced with sensory details"
      - "Sweeps done sequentially"
      - "Copy reads naturally after edits"
    verdict:
      pass: "score >= 7"
      fail: "score < 7"

  dependencies: []

  related_sops:
    - task-outcome-description-rewrite
    - task-mht-exercise
    - task-sugarman-qa-gate
