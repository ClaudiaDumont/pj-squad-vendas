sop:
  id: task-negative-positive-hook-system
  version: "1.0"
  title: "Negative/Positive Hook System"
  purpose: "Create paired named hooks — a negative hook (problem name) and positive hook (solution mechanism) — that anchor all campaign copy"
  classification:
    domain: copywriting
    category: specialist
    source_agent: jon-benson
    tier: T3

  inputs:
    - name: target_niche_research
      type: document
      required: true
      description: "Target niche research with problems and competitor landscape"
    - name: product_mechanism
      type: object
      required: true
      description: "How the product actually works/solves the problem"

  outputs:
    - name: negative_hook
      type: string
      description: "Named negative hook (2-4 words, the enemy)"
    - name: positive_hook
      type: string
      description: "Named positive hook (2-4 words, the solution mechanism)"

  steps:
    - id: step_1
      action: identify_big_problem
      description: "Research and isolate the single most pressing problem in the niche"

    - id: step_2
      action: create_negative_hook
      description: "Give the problem a memorable proprietary name (2-4 words, authoritative, novel)"
      critical: true
      error_handling:
        condition: "Name is too generic or already used by competitor"
        action: "Add specificity or proprietary framing, research competitor language"

    - id: step_3
      action: create_positive_hook
      description: "Name the unique solution mechanism (2-4 words, evokes transformation)"
      critical: true
      error_handling:
        condition: "Name sounds like a commodity"
        action: "Rename with proprietary framing that implies discovery or invention"

    - id: step_4
      action: write_tease_language
      description: "Create open loop tease for Lead sections without revealing full mechanism"

    - id: step_5
      action: write_reveal_language
      description: "Create full reveal connecting negative hook to positive hook for Solution sections"

  quality_gate:
    min_score: 7
    max_score: 10
    checks:
      - "Negative hook has 2-4 word proprietary name"
      - "Positive hook has distinct proprietary name"
      - "Positive hook directly counters negative hook"
      - "Neither hook used by competitor"
      - "Both hooks memorable after one read"
      - "Tease creates curiosity without revealing mechanism"
    verdict:
      pass: "score >= 7"
      fail: "score < 7"

  dependencies: []

  related_sops:
    - task-hook-discovery
    - task-vsl-5-step
    - task-big-idea-system
