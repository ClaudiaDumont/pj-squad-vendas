sop:
  id: task-3x-vsl-creation
  version: "1.0"
  title: "3X VSL Method — Multi-Length Versions"
  purpose: "Extract four VSL versions at different lengths from a single full-length VSL for deployment across different funnel stages"
  classification:
    domain: copywriting
    category: specialist
    source_agent: jon-benson
    tier: T3

  inputs:
    - name: complete_vsl
      type: document
      required: true
      description: "Complete 5-Step VSL script (from task-vsl-5-step)"

  outputs:
    - name: vsl_versions
      type: list
      description: "4 VSL scripts: 1-min (opt-in), 5-min (upsell), 20-min (mid-ticket), 45-min (high-ticket)"

  steps:
    - id: step_1
      action: validate_master_vsl
      description: "Verify complete 5-Step VSL is finished and validated as master document"

    - id: step_2
      action: extract_1min_vsl
      description: "Compress SNAP into standalone 60-second opt-in video: hook + one claim + CTA"
      critical: true

    - id: step_3
      action: extract_5min_vsl
      description: "Create self-contained mini-pitch: SNAP + mechanism tease + 2-3 proof points + CTA"

    - id: step_4
      action: deploy_20min_vsl
      description: "Use complete 5-Step Formula without expansion for mid-ticket"

    - id: step_5
      action: expand_45min_vsl
      description: "Expand 5-Step with extended education, FAQ, additional testimonials, deeper exploration"

  quality_gate:
    min_score: 7
    max_score: 10
    checks:
      - "1-min version functions as standalone opt-in piece"
      - "5-min version feels complete not truncated"
      - "20-min includes all 5 steps without padding"
      - "45-min adds genuine value not filler"
      - "Consistent hooks across all versions"
      - "Each version has appropriate CTA for funnel stage"
    verdict:
      pass: "score >= 7"
      fail: "score < 7"

  dependencies:
    - task-vsl-5-step

  related_sops:
    - task-alpha-omega-optimization
    - task-90s-smartphone-pattern-interrupt
