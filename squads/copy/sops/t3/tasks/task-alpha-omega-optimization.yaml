sop:
  id: task-alpha-omega-optimization
  version: "1.0"
  title: "Alpha/Omega VSL Optimization"
  purpose: "Optimize underperforming VSL by isolating and rewriting Lead (Alpha) and Close (Omega) sections while keeping middle stable for controlled A/B testing"
  classification:
    domain: copywriting
    category: specialist
    source_agent: jon-benson
    tier: T3

  inputs:
    - name: existing_vsl
      type: document
      required: true
      description: "VSL script that is not converting or needs optimization"

  outputs:
    - name: optimized_vsl
      type: document
      description: "VSL with winning Alpha and Omega (benchmark: 0.5% to 9% = 1800% increase)"

  steps:
    - id: step_1
      action: rewrite_alpha
      description: "Rewrite Lead/pattern interrupt with minimum 3 structurally different versions"
      critical: true
      min_variants: 3
      error_handling:
        condition: "Variants are minor word tweaks rather than structural rewrites"
        action: "Discard and create versions with fundamentally different hooks and angles"

    - id: step_2
      action: rewrite_omega
      description: "Rewrite Close/guarantee/CTA with minimum 3 emotionally different versions"
      critical: true
      min_variants: 3

    - id: step_3
      action: stabilize_middle
      description: "Lock story, problem, and solution sections as immutable control across all variants"

    - id: step_4
      action: execute_ab_test
      description: "Test Alpha variants first, then Omega variants — never simultaneously"
      error_handling:
        condition: "Alpha and Omega tested simultaneously"
        action: "Stop test, isolate variables, restart with Alpha-only variants"

  quality_gate:
    min_score: 7
    max_score: 10
    checks:
      - "Minimum 3 Alpha variants with structural differences"
      - "Minimum 3 Omega variants with different emotional conclusions"
      - "Middle section identical across all variants"
      - "Tests run sequentially not simultaneously"
      - "Statistical significance achieved before declaring winner"
    verdict:
      pass: "score >= 7"
      fail: "score < 7"

  dependencies:
    - task-vsl-5-step

  related_sops:
    - task-90s-smartphone-pattern-interrupt
    - task-negative-positive-hook-system
